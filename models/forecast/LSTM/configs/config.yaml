# 数据相关配置
data:
  # 预测样本文件路径，由预处理阶段生成
  data_path: "data/processed/forecast/forecast_samples.csv"
  # 切分模式：默认按家庭切分，评估新家庭泛化能力；random 仅建议用于开发阶段冒烟
  split_mode: "by_house"
  # 训练集占比，剩余部分继续划分给验证集和测试集
  train_ratio: 0.7
  # 验证集占比，测试集占比 = 1 - train_ratio - val_ratio
  val_ratio: 0.15
  # 预测输入特征，默认先使用单通道 aggregate baseline
  feature_names:
    - "aggregate"
  # aggregate 默认用输入窗口自身统计量做样本级归一化，更适合跨家庭泛化
  aggregate_normalization: "input_window"
  # 归一化安全下界，避免标准差过小导致数值不稳定
  aggregate_norm_eps: 1.0e-6

# 模型结构配置
model:
  # 输入特征维度，必须与 data.feature_names 长度一致
  input_size: 1
  # LSTM 隐状态维度
  hidden_size: 256
  # LSTM 堆叠层数
  num_layers: 3
  # Dropout 比例，用于缓解过拟合
  dropout: 0.2
  # 预测步长，当前固定为 96
  target_length: 96
  # 训练阶段 teacher forcing 比例
  teacher_forcing_ratio: 0.5

# 训练配置
train:
  # 训练输出目录，保存 best_model.pt、training_summary.json 和 result.png
  output_dir: "forecast/LSTM/output"
  # 每个 batch 的样本数
  batch_size: 512
  # 训练轮数
  epochs: 200
  # Adam 优化器学习率
  learning_rate: 0.0002
  # Adam 优化器权重衰减系数
  weight_decay: 0.0001
  # 梯度裁剪阈值；设为 null 表示关闭，建议 LSTM 默认开启
  gradient_clip_norm: 1.0
  # 随机种子，保证可复现
  seed: 42
  # Early stopping 容忍轮数；连续这么多轮验证集 RMSE 无明显下降就提前停止
  early_stopping_patience: 50
  # Early stopping 的最小改进阈值
  early_stopping_min_delta: 0.0001
  # 损失函数，支持 mse / huber
  loss_name: "huber"
  # HuberLoss 的 delta，仅在 loss_name=huber 时生效
  huber_delta: 1.0

# 测试配置
test:
  # 指定 checkpoint 路径；为 null 时默认读取 train.output_dir/best_model.pt
  checkpoint_path: null
  # 测试输出目录，保存 test_summary.json
  output_dir: "forecast/LSTM/output"
  # 测试时的 batch 大小
  batch_size: 512

# 推理配置
predict:
  # 指定 checkpoint 路径；为 null 时默认读取 train.output_dir/best_model.pt
  checkpoint_path: null
  # 推理输出目录，保存 prediction.csv 或 prediction.json
  output_dir: "forecast/LSTM/output"
  # 批量推理时的 batch 大小
  batch_size: 128
