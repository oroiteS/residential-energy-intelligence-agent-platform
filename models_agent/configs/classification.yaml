# 分类模型本地推理配置

data:
  feature_names:
    - "aggregate"
    - "slot_sin"
    - "slot_cos"
    - "weekday_sin"
    - "weekday_cos"

model:
  input_channels: 5
  num_classes: 4
  channel_sizes:
    - 32
    - 64
    - 128
  kernel_size: 3
  dropout: 0.2

train:
  output_dir: "../models_agent/checkpoints/classification/tcn"

predict:
  checkpoint_path: "../models_agent/checkpoints/classification/tcn/best_model.pt"
  batch_size: 128
