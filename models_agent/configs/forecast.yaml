# 预测模型本地推理配置

default_model_type: "lstm"

data:
  feature_names:
    - "aggregate"
    - "slot_sin"
    - "slot_cos"
    - "weekday_sin"
    - "weekday_cos"
  aggregate_normalization: "input_window"
  aggregate_norm_eps: 1.0e-6

lstm:
  train_output_dir: "../models_agent/checkpoints/forecast/lstm"
  model:
    input_size: 5
    hidden_size: 256
    num_layers: 3
    dropout: 0.2
    target_length: 96
  predict:
    checkpoint_path: "../models_agent/checkpoints/forecast/lstm/best_model.pt"
    batch_size: 128

transformer:
  train_output_dir: "../models_agent/checkpoints/forecast/transformer"
  model:
    input_size: 5
    d_model: 128
    num_layers: 2
    num_heads: 4
    ffn_dim: 512
    dropout: 0.2
    target_length: 96
    patch_length: 16
    patch_stride: 8
  predict:
    checkpoint_path: "../models_agent/checkpoints/forecast/transformer/best_model.pt"
    batch_size: 128
